<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cartera — Portfolio Manager</title>
  <meta name="description" content="Gestión de cartera de acciones y fondos con precios en tiempo real, control fiscal IRPF y gestión de riesgo">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f6f8; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
    .row:hover { background: #f0f1f4 !important; }
    input:focus, select:focus { border-color: #059669 !important; outline: none; box-shadow: 0 0 0 3px rgba(5,150,105,0.08); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #e2e5ea; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── UTILS ───────────────────────────────────────────────────────────
const fmt = (n, d = 2) => {
  if (n == null || isNaN(n)) return "—";
  return new Intl.NumberFormat("es-ES", { minimumFractionDigits: d, maximumFractionDigits: d }).format(n);
};
const fmtEur = (n) => (isNaN(n) ? "—" : `${fmt(n)} €`);
const fmtPct = (n) => (isNaN(n) ? "—" : `${n >= 0 ? "+" : ""}${fmt(n)}%`);
const pctChange = (c, p) => (p === 0 ? 0 : ((c - p) / p) * 100);
const uid = () => Math.random().toString(36).slice(2, 10);

// ─── PRICE SERVICE (via Cloudflare Worker proxy) ─────────────────────
// The proxy URL points to your Cloudflare Worker.
// Change this to your actual worker URL after deploying.
const PROXY_BASE = "https://finnhub-proxy.TU-USUARIO.workers.dev";

async function finnhubQuote(symbol, proxyUrl) {
  const base = proxyUrl || PROXY_BASE;
  const res = await fetch(`${base}/quote?symbol=${encodeURIComponent(symbol)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  if (d.c === 0 && d.h === 0 && d.l === 0) throw new Error("No data");
  return { current: d.c, high: d.h, low: d.l, open: d.o, prevClose: d.pc, change: d.d, changePct: d.dp };
}

async function finnhubSearch(query, proxyUrl) {
  const base = proxyUrl || PROXY_BASE;
  const res = await fetch(`${base}/search?q=${encodeURIComponent(query)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  return (d.result || []).slice(0, 8);
}

async function finnhubMulti(symbols, proxyUrl) {
  const base = proxyUrl || PROXY_BASE;
  const res = await fetch(`${base}/multi?symbols=${encodeURIComponent(symbols.join(","))}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ─── BCE EXCHANGE RATE (via Frankfurter / ECB official rates) ────────
const ecbCache = {};

async function getECBRate(date, currency = "USD") {
  if (currency === "EUR") return { rate: 1, date };
  const key = `${date}_${currency}`;
  if (ecbCache[key]) return ecbCache[key];
  try {
    const res = await fetch(`https://api.frankfurter.dev/v1/${date}?symbols=${currency}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    const rate = d.rates?.[currency];
    if (!rate) throw new Error("No rate");
    const result = { rate, date: d.date }; // date may differ if weekend/holiday
    ecbCache[key] = result;
    ecbCache[`${d.date}_${currency}`] = result;
    return result;
  } catch (e) {
    console.warn(`ECB rate error for ${date}/${currency}:`, e.message);
    return null;
  }
}

async function getCurrentECBRate(currency = "USD") {
  if (currency === "EUR") return { rate: 1, date: "hoy" };
  const key = `latest_${currency}`;
  if (ecbCache[key] && (Date.now() - ecbCache[key]._ts < 3600000)) return ecbCache[key];
  try {
    const res = await fetch(`https://api.frankfurter.dev/v1/latest?symbols=${currency}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    const rate = d.rates?.[currency];
    if (!rate) throw new Error("No rate");
    const result = { rate, date: d.date, _ts: Date.now() };
    ecbCache[key] = result;
    return result;
  } catch (e) {
    console.warn("ECB latest rate error:", e.message);
    return null;
  }
}

// Convert foreign amount to EUR: amount_foreign / rate = EUR
const toEur = (amount, rate) => rate ? amount / rate : amount;

// ─── TICKER MAP (European tickers need exchange suffix) ──────────────
const TICKER_MAP = {
  SAN: "SAN.MC", BBVA: "BBVA.MC", ITX: "ITX.MC", TEF: "TEF.MC",
  IBE: "IBE.MC", REP: "REP.MC", AMS: "AMS.MC", FER: "FER.MC",
  ENG: "ENG.MC", MAP: "MAP.MC", CAIXABANK: "CABK.MC", CABK: "CABK.MC",
  ACCIONA: "ANA.MC", ANA: "ANA.MC", CELLNEX: "CLNX.MC", CLNX: "CLNX.MC",
  ACS: "ACS.MC", GRF: "GRF.MC", AENA: "AENA.MC", LOG: "LOG.MC",
  IAG: "IAG.MC", PHM: "PHM.MC", SAB: "SAB.MC",
};

function toFinnhubSymbol(ticker) {
  const up = ticker.toUpperCase().trim();
  if (TICKER_MAP[up]) return TICKER_MAP[up];
  if (up.includes(".")) return up;
  return up;
}

// ─── STORAGE ─────────────────────────────────────────────────────────
const STORE_KEY = "brus_portfolio_v2";
const loadState = () => {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return {
    proxyUrl: "",
    holdings: [
      { id: uid(), ticker: "SAN", finnhubSymbol: "SAN.MC", name: "Banco Santander", type: "accion", shares: 500, avgPrice: 5.12, currentPrice: null, sector: "Financiero", currency: "EUR", buyDate: "2024-06-15", ecbRateBuy: 1, dayChange: null, dayChangePct: null, dayHigh: null, dayLow: null },
      { id: uid(), ticker: "BBVA", finnhubSymbol: "BBVA.MC", name: "BBVA", type: "accion", shares: 300, avgPrice: 10.20, currentPrice: null, sector: "Financiero", currency: "EUR", buyDate: "2024-03-10", ecbRateBuy: 1, dayChange: null, dayChangePct: null, dayHigh: null, dayLow: null },
      { id: uid(), ticker: "ITX", finnhubSymbol: "ITX.MC", name: "Inditex", type: "accion", shares: 50, avgPrice: 35.80, currentPrice: null, sector: "Consumo", currency: "EUR", buyDate: "2024-01-20", ecbRateBuy: 1, dayChange: null, dayChangePct: null, dayHigh: null, dayLow: null },
      { id: uid(), ticker: "NVDA", finnhubSymbol: "NVDA", name: "NVIDIA Corp", type: "accion", shares: 20, avgPrice: 450.00, currentPrice: null, sector: "Tecnología", currency: "USD", buyDate: "2024-05-10", ecbRateBuy: 1.0772, dayChange: null, dayChangePct: null, dayHigh: null, dayLow: null },
      { id: uid(), ticker: "AAPL", finnhubSymbol: "AAPL", name: "Apple Inc", type: "accion", shares: 15, avgPrice: 160.00, currentPrice: null, sector: "Tecnología", currency: "USD", buyDate: "2023-11-20", ecbRateBuy: 1.0927, dayChange: null, dayChangePct: null, dayHigh: null, dayLow: null },
    ],
    sales: [
      { id: uid(), ticker: "TEF", name: "Telefónica", sellDate: "2025-11-15", buyDate: "2025-01-10", shares: 200, buyPrice: 3.85, sellPrice: 4.38, fees: 4.90, currency: "EUR", ecbRateBuy: 1, ecbRateSell: 1 },
      { id: uid(), ticker: "REP", name: "Repsol", sellDate: "2026-01-10", buyDate: "2025-06-15", shares: 100, buyPrice: 13.50, sellPrice: 14.90, fees: 4.90, currency: "EUR", ecbRateBuy: 1, ecbRateSell: 1 },
    ],
    riskTrades: [],
  };
};

// ─── ICONS ───────────────────────────────────────────────────────────
const Icon = ({ d, size = 18, ...p }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d={d} /></svg>
);
const ChartI = () => <Icon d="M3 3v18h18M7 16l4-8 4 4 6-10" />;
const SaleI = () => <Icon d="M12 1v22M5 8l7-7 7 7" />;
const RiskI = () => <React.Fragment><Icon d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" strokeWidth="2" /><line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" strokeWidth="2" /></React.Fragment>;
const PlusI = () => <Icon d="M12 5v14M5 12h14" size={15} />;
const TrashI = () => <Icon d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2" size={14} />;
const RefreshI = () => <Icon d="M23 4v6h-6M20.49 15a9 9 0 11-2.12-9.36L23 10" size={14} />;
const KeyI = () => <Icon d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.78 7.78 5.5 5.5 0 017.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" size={16} />;
const SearchI = () => <Icon d="M11 17.25a6.25 6.25 0 110-12.5 6.25 6.25 0 010 12.5zM16 16l4.5 4.5" size={15} />;
const LiveDot = ({ active }) => (
  <span style={{
    display: "inline-block", width: 8, height: 8, borderRadius: "50%",
    background: active ? "#059669" : "#dc2626",
    boxShadow: active ? "0 0 8px rgba(5,150,105,0.5)" : "none",
    animation: active ? "pulse 2s infinite" : "none",
  }} />
);

// ─── COLORS ──────────────────────────────────────────────────────────
const C = {
  bg: "#f5f6f8", card: "#ffffff", cardAlt: "#f0f1f4", border: "#e2e5ea",
  accent: "#059669", accentDim: "rgba(5,150,105,0.08)",
  red: "#dc2626", redDim: "rgba(220,38,38,0.07)",
  amber: "#b45309", amberDim: "rgba(180,83,9,0.07)",
  blue: "#2563eb", blueDim: "rgba(37,99,235,0.07)",
  purple: "#7c3aed",
  text: "#1a1d23", textDim: "#5f6672", textMuted: "#9ca3af",
};

// ═══════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const [state, setState] = useState(loadState);
  const [tab, setTab] = useState("cartera");
  const [modal, setModal] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [loading, setLoading] = useState(false);
  const [apiStatus, setApiStatus] = useState("idle"); // idle | ok | error
  const intervalRef = useRef(null);

  // Persist
  useEffect(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch {}
  }, [state]);

  // ─── FETCH ALL PRICES ───
  const refreshPrices = useCallback(async () => {
    if (!state.proxyUrl || state.holdings.length === 0) return;
    setLoading(true);
    let anySuccess = false;
    const updated = [...state.holdings];

    // Fetch current ECB USD rate once for all USD holdings
    let currentUsdRate = null;
    if (updated.some((h) => h.currency === "USD")) {
      const ecb = await getCurrentECBRate("USD");
      if (ecb) currentUsdRate = ecb.rate;
    }

    // Use /multi endpoint for batch fetch (faster, single request)
    const symbols = updated.map((h) => h.finnhubSymbol || toFinnhubSymbol(h.ticker));
    try {
      const batch = await finnhubMulti(symbols, state.proxyUrl);
      for (let i = 0; i < updated.length; i++) {
        const sym = symbols[i];
        const d = batch[sym];
        if (d && !d.error && d.c > 0) {
          updated[i] = {
            ...updated[i],
            finnhubSymbol: sym,
            currentPrice: d.c,
            dayChange: d.d,
            dayChangePct: d.dp,
            dayHigh: d.h,
            dayLow: d.l,
            ecbRateNow: updated[i].currency === "USD" ? currentUsdRate : 1,
          };
          anySuccess = true;
        }
      }
    } catch (err) {
      console.warn("Batch fetch error, falling back to individual:", err.message);
      // Fallback: fetch one by one
      for (let i = 0; i < updated.length; i++) {
        const h = updated[i];
        const symbol = h.finnhubSymbol || toFinnhubSymbol(h.ticker);
        try {
          const q = await finnhubQuote(symbol, state.proxyUrl);
          updated[i] = { ...h, finnhubSymbol: symbol, currentPrice: q.current, dayChange: q.change, dayChangePct: q.changePct, dayHigh: q.high, dayLow: q.low, ecbRateNow: h.currency === "USD" ? currentUsdRate : 1 };
          anySuccess = true;
        } catch (e) { console.warn(`Error ${symbol}:`, e.message); }
        if (i < updated.length - 1) await new Promise((r) => setTimeout(r, 300));
      }
    }

    setState((prev) => ({ ...prev, holdings: updated }));
    setApiStatus(anySuccess ? "ok" : "error");
    setLastUpdate(new Date());
    setLoading(false);
  }, [state.proxyUrl, state.holdings.length]);

  // Auto-refresh every 60s
  useEffect(() => {
    if (intervalRef.current) clearInterval(intervalRef.current);
    if (state.proxyUrl) {
      refreshPrices();
      intervalRef.current = setInterval(refreshPrices, 60000);
    }
    return () => clearInterval(intervalRef.current);
  }, [state.proxyUrl]);

  // ─── COMPUTED (all in EUR) ───
  const holdingsWithPrice = state.holdings.filter((h) => h.currentPrice != null);
  const totalInvested = holdingsWithPrice.reduce((s, h) => {
    const avgEur = h.currency === "USD" ? toEur(h.avgPrice, h.ecbRateBuy) : h.avgPrice;
    return s + h.shares * avgEur;
  }, 0);
  const totalCurrent = holdingsWithPrice.reduce((s, h) => {
    const curEur = h.currency === "USD" ? toEur(h.currentPrice, h.ecbRateNow || h.ecbRateBuy) : h.currentPrice;
    return s + h.shares * curEur;
  }, 0);
  const totalPL = totalCurrent - totalInvested;
  const totalPLPct = totalInvested > 0 ? pctChange(totalCurrent, totalInvested) : 0;
  const realizedPL = state.sales.reduce((s, sale) => {
    const buyEur = sale.currency === "USD" ? toEur(sale.buyPrice, sale.ecbRateBuy) : sale.buyPrice;
    const sellEur = sale.currency === "USD" ? toEur(sale.sellPrice, sale.ecbRateSell) : sale.sellPrice;
    return s + (sellEur - buyEur) * sale.shares - (sale.fees || 0);
  }, 0);

  // ─── HANDLERS ───
  const setProxyUrl = (url) => setState((p) => ({ ...p, proxyUrl: url }));
  const addHolding = (h) => setState((p) => ({ ...p, holdings: [...p.holdings, { ...h, id: uid() }] }));
  const removeHolding = (id) => setState((p) => ({ ...p, holdings: p.holdings.filter((h) => h.id !== id) }));
  const addSale = (s) => setState((p) => ({ ...p, sales: [...p.sales, { ...s, id: uid() }] }));
  const removeSale = (id) => setState((p) => ({ ...p, sales: p.sales.filter((s) => s.id !== id) }));
  const addRiskTrade = (r) => setState((p) => ({ ...p, riskTrades: [...p.riskTrades, { ...r, id: uid() }] }));
  const removeRiskTrade = (id) => setState((p) => ({ ...p, riskTrades: p.riskTrades.filter((r) => r.id !== id) }));

  const cs = { background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: 18, boxShadow: "0 1px 3px rgba(0,0,0,0.06)" };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'JetBrains Mono','SF Mono','Fira Code',monospace", fontSize: 13 }}>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
        .row:hover { background: ${C.cardAlt} !important; }
        input:focus, select:focus { border-color: ${C.accent} !important; outline: none; box-shadow: 0 0 0 3px ${C.accentDim}; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: ${C.border}; border-radius: 3px; }
      `}</style>

      {/* ─── HEADER ─── */}
      <header style={{
        background: `linear-gradient(180deg, #ffffff 0%, ${C.bg} 100%)`,
        borderBottom: `1px solid ${C.border}`, padding: "14px 20px",
        position: "sticky", top: 0, zIndex: 100,
      }}>
        <div style={{ maxWidth: 1100, margin: "0 auto" }}>
          {/* Top row */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 34, height: 34, borderRadius: 8,
                background: `linear-gradient(135deg, ${C.accent}, #059669)`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontFamily: "Inter,sans-serif", fontWeight: 800, fontSize: 16, color: "#fff",
              }}>B</div>
              <div>
                <div style={{ fontFamily: "Inter,sans-serif", fontWeight: 700, fontSize: 17, letterSpacing: "-0.5px" }}>Mi Cartera</div>
                <div style={{ fontSize: 9, color: C.textDim, display: "flex", alignItems: "center", gap: 5 }}>
                  <LiveDot active={apiStatus === "ok"} />
                  {apiStatus === "ok" ? "LIVE · Finnhub" : apiStatus === "error" ? "Error API" : "Sin conexión"}
                  {lastUpdate && <span style={{ marginLeft: 4 }}>· {lastUpdate.toLocaleTimeString("es-ES")}</span>}
                </div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <button onClick={() => setModal("apikey")} style={{
                background: state.proxyUrl ? C.accentDim : C.amberDim,
                border: `1px solid ${state.proxyUrl ? C.accent : C.amber}33`,
                borderRadius: 6, padding: "5px 10px", color: state.proxyUrl ? C.accent : C.amber,
                cursor: "pointer", fontSize: 10, display: "flex", alignItems: "center", gap: 4, fontFamily: "inherit",
              }}>
                <KeyI /> {state.proxyUrl ? "Proxy ✓" : "Configurar Proxy"}
              </button>
              <button onClick={refreshPrices} disabled={loading || !state.proxyUrl} style={{
                background: C.accentDim, border: `1px solid ${C.accent}33`,
                borderRadius: 6, padding: "5px 10px", color: C.accent,
                cursor: state.proxyUrl ? "pointer" : "not-allowed", fontSize: 10,
                display: "flex", alignItems: "center", gap: 4, fontFamily: "inherit",
                opacity: loading ? 0.5 : 1,
              }}>
                <RefreshI /> {loading ? "Cargando..." : "Actualizar"}
              </button>
            </div>
          </div>

          {/* Summary strip */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10, marginTop: 12 }}>
            {[
              { label: "Valor Cartera", val: fmtEur(totalCurrent), c: C.text },
              { label: "Invertido", val: fmtEur(totalInvested), c: C.blue },
              { label: "P/L No Realizado", val: `${fmtEur(totalPL)} (${fmtPct(totalPLPct)})`, c: totalPL >= 0 ? C.accent : C.red },
              { label: "P/L Realizado", val: fmtEur(realizedPL), c: realizedPL >= 0 ? C.accent : C.red },
            ].map((x, i) => (
              <div key={i} style={{ padding: "8px 12px", borderRadius: 8, background: `${x.c}06`, border: `1px solid ${x.c}15` }}>
                <div style={{ fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 2 }}>{x.label}</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: x.c }}>{x.val}</div>
              </div>
            ))}
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", gap: 3, marginTop: 12 }}>
            {[
              { key: "cartera", label: "Cartera", icon: <ChartI /> },
              { key: "ventas", label: "Ventas / IRPF", icon: <SaleI /> },
              { key: "riesgo", label: "Gestión Riesgo", icon: <RiskI /> },
            ].map((t) => (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                flex: 1, padding: "9px 10px", borderRadius: 8,
                border: tab === t.key ? `1px solid ${C.accent}44` : "1px solid transparent",
                background: tab === t.key ? C.accentDim : "transparent",
                color: tab === t.key ? C.accent : C.textDim,
                cursor: "pointer", fontSize: 11, fontWeight: 500,
                display: "flex", alignItems: "center", justifyContent: "center", gap: 5,
                fontFamily: "inherit", transition: "all 0.15s",
              }}>{t.icon} {t.label}</button>
            ))}
          </div>
        </div>
      </header>

      {/* ─── CONTENT ─── */}
      <main style={{ maxWidth: 1100, margin: "0 auto", padding: 18 }}>
        {!state.proxyUrl && (
          <div style={{ ...cs, marginBottom: 16, background: `${C.amber}08`, border: `1px solid ${C.amber}25`, textAlign: "center", animation: "fadeIn 0.3s" }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.amber, marginBottom: 6 }}>Configura tu Proxy de precios</div>
            <div style={{ fontSize: 11, color: C.textDim, marginBottom: 12 }}>
              Despliega el Cloudflare Worker y pega aquí la URL. → 60 peticiones/minuto, precios en tiempo real de US + Europa.
            </div>
            <Btn onClick={() => setModal("apikey")} style={{ background: C.amber, color: "#fff" }}><KeyI /> Configurar proxy</Btn>
          </div>
        )}

        {tab === "cartera" && <CarteraTab holdings={state.holdings} addHolding={addHolding} removeHolding={removeHolding} proxyUrl={state.proxyUrl} setModal={setModal} cs={cs} refreshPrices={refreshPrices} />}
        {tab === "ventas" && <VentasTab sales={state.sales} addSale={addSale} removeSale={removeSale} setModal={setModal} cs={cs} />}
        {tab === "riesgo" && <RiesgoTab riskTrades={state.riskTrades} addRiskTrade={addRiskTrade} removeRiskTrade={removeRiskTrade} setModal={setModal} cs={cs} />}
      </main>

      {/* ─── MODAL ─── */}
      {modal && (
        <div onClick={() => setModal(null)} style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)",
          backdropFilter: "blur(6px)", zIndex: 200,
          display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
        }}>
          <div onClick={(e) => e.stopPropagation()} style={{
            ...cs, maxWidth: 480, width: "100%", maxHeight: "85vh", overflowY: "auto",
            animation: "fadeIn 0.2s",
          }}>
            {modal === "apikey" ? (
              <ApiKeyModal proxyUrl={state.proxyUrl} setProxyUrl={setProxyUrl} close={() => setModal(null)} />
            ) : modal}
          </div>
        </div>
      )}
    </div>
  );
}

// PROXY CONFIG MODAL
// ═══════════════════════════════════════════════════════════════════════
function ApiKeyModal({ proxyUrl, setProxyUrl, close }) {
  const [url, setUrl] = useState(proxyUrl || "");
  const [testing, setTesting] = useState(false);
  const [result, setResult] = useState(null);

  const test = async () => {
    setTesting(true);
    setResult(null);
    try {
      let testUrl = url.trim().replace(/\/+$/, "");
      const q = await finnhubQuote("AAPL", testUrl);
      setResult({ ok: true, msg: `Apple: $${q.current} — Proxy funcionando correctamente` });
    } catch (e) {
      setResult({ ok: false, msg: `Error: ${e.message}. Verifica la URL del worker.` });
    }
    setTesting(false);
  };

  return (
    <div>
      <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 15, marginBottom: 4, color: C.accent }}>Configurar Proxy de Precios</h3>
      <p style={{ fontSize: 11, color: C.textDim, marginBottom: 14, lineHeight: 1.6 }}>
        Introduce la URL de tu Cloudflare Worker que hace de proxy a Finnhub. 
        Despliega el worker con tu API key de <a href="https://finnhub.io" target="_blank" rel="noreferrer" style={{ color: C.blue }}>finnhub.io</a> y 
        pega aquí la URL resultante.
      </p>
      <Input label="URL del Worker" value={url} onChange={(e) => setUrl(e.target.value)} placeholder="https://finnhub-proxy.tu-usuario.workers.dev" />
      <div style={{ fontSize: 10, color: C.textDim, marginTop: -6, marginBottom: 10, lineHeight: 1.5 }}>
        Endpoints disponibles: <code style={{ background: C.cardAlt, padding: "1px 4px", borderRadius: 3 }}>/quote</code> <code style={{ background: C.cardAlt, padding: "1px 4px", borderRadius: 3 }}>/search</code> <code style={{ background: C.cardAlt, padding: "1px 4px", borderRadius: 3 }}>/multi</code>
      </div>
      {result && (
        <div style={{
          padding: "8px 12px", borderRadius: 6, marginBottom: 10, fontSize: 11,
          background: result.ok ? C.accentDim : C.redDim,
          color: result.ok ? C.accent : C.red,
          border: `1px solid ${result.ok ? C.accent : C.red}33`,
        }}>{result.msg}</div>
      )}
      <div style={{ display: "flex", gap: 6 }}>
        <Btn onClick={test} disabled={!url || testing} variant="ghost">{testing ? "Probando..." : "Probar conexión"}</Btn>
        <Btn onClick={() => { setProxyUrl(url.trim().replace(/\/+$/, "")); close(); }}>Guardar</Btn>
        <Btn variant="ghost" onClick={close}>Cancelar</Btn>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// CARTERA TAB
// ═══════════════════════════════════════════════════════════════════════
function CarteraTab({ holdings, addHolding, removeHolding, proxyUrl, setModal, cs, refreshPrices }) {
  const acciones = holdings.filter((h) => h.type === "accion");
  const fondos = holdings.filter((h) => h.type === "fondo");
  const withPrice = holdings.filter((h) => h.currentPrice != null);

  // Sectors
  const sectors = {};
  withPrice.forEach((h) => {
    const rateNow = h.ecbRateNow || h.ecbRateBuy || 1;
    const curEur = h.currency === "USD" ? toEur(h.currentPrice, rateNow) : h.currentPrice;
    const v = h.shares * curEur;
    sectors[h.sector] = (sectors[h.sector] || 0) + v;
  });
  const totalVal = Object.values(sectors).reduce((a, b) => a + b, 0);
  const sectorColors = [C.accent, C.blue, C.amber, C.red, C.purple, "#ec4899", "#14b8a6", "#f97316"];

  const HoldingForm = () => {
    const [form, setForm] = useState({ ticker: "", name: "", type: "accion", shares: "", avgPrice: "", sector: "", finnhubSymbol: "", currency: "EUR", buyDate: "" });
    const [results, setResults] = useState([]);
    const [searching, setSearching] = useState(false);
    const [ecbRate, setEcbRate] = useState(null);
    const [ecbLoading, setEcbLoading] = useState(false);
    const debounceRef = useRef(null);

    // Auto-fetch ECB rate when date + USD selected
    useEffect(() => {
      if (form.currency === "USD" && form.buyDate) {
        setEcbLoading(true);
        getECBRate(form.buyDate, "USD").then((r) => {
          setEcbRate(r);
          setEcbLoading(false);
        });
      } else {
        setEcbRate(null);
      }
    }, [form.currency, form.buyDate]);

    const search = (q) => {
      if (debounceRef.current) clearTimeout(debounceRef.current);
      if (!q || !proxyUrl) { setResults([]); return; }
      debounceRef.current = setTimeout(async () => {
        setSearching(true);
        try {
          const r = await finnhubSearch(q, proxyUrl);
          setResults(r);
        } catch { setResults([]); }
        setSearching(false);
      }, 400);
    };

    const selectResult = (r) => {
      const isUS = !r.symbol.includes(".");
      setForm((f) => ({ ...f, ticker: r.displaySymbol || r.symbol, finnhubSymbol: r.symbol, name: r.description || r.symbol, currency: isUS ? "USD" : "EUR" }));
      setResults([]);
    };

    const submit = () => {
      if (!form.ticker || !form.shares || !form.avgPrice) return;
      if (form.currency === "USD" && !form.buyDate) return;
      addHolding({
        ...form,
        finnhubSymbol: form.finnhubSymbol || toFinnhubSymbol(form.ticker),
        shares: parseFloat(form.shares),
        avgPrice: parseFloat(form.avgPrice),
        ecbRateBuy: form.currency === "USD" && ecbRate ? ecbRate.rate : 1,
        ecbRateNow: null,
        currentPrice: null, dayChange: null, dayChangePct: null, dayHigh: null, dayLow: null,
      });
      setModal(null);
      setTimeout(refreshPrices, 500);
    };

    const avgEur = form.avgPrice && form.currency === "USD" && ecbRate ? toEur(parseFloat(form.avgPrice), ecbRate.rate) : null;

    return (
      <div>
        <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 15, marginBottom: 14, color: C.accent }}>Añadir Posición</h3>
        <div style={{ position: "relative" }}>
          <Input label="Buscar Ticker" value={form.ticker} placeholder="Busca: AAPL, SAN, BBVA..."
            onChange={(e) => { setForm((f) => ({ ...f, ticker: e.target.value.toUpperCase() })); search(e.target.value); }} />
          {searching && <div style={{ fontSize: 10, color: C.textDim, marginTop: -8, marginBottom: 8 }}>Buscando...</div>}
          {results.length > 0 && (
            <div style={{
              position: "absolute", top: "100%", left: 0, right: 0, zIndex: 10,
              background: C.card, border: `1px solid ${C.border}`, borderRadius: 6,
              maxHeight: 200, overflowY: "auto", marginTop: -6,
            }}>
              {results.map((r, i) => (
                <div key={i} onClick={() => selectResult(r)} style={{
                  padding: "8px 10px", cursor: "pointer", borderBottom: `1px solid ${C.border}`,
                  fontSize: 11, display: "flex", justifyContent: "space-between",
                }}
                  className="row"
                >
                  <span><b style={{ color: C.accent }}>{r.displaySymbol || r.symbol}</b> — {r.description}</span>
                  <span style={{ color: C.textMuted, fontSize: 9 }}>{r.type}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <Input label="Nombre" value={form.name} onChange={(e) => setForm((f) => ({ ...f, name: e.target.value }))} placeholder="Banco Santander" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <Select label="Tipo" value={form.type} onChange={(e) => setForm((f) => ({ ...f, type: e.target.value }))}>
            <option value="accion">Acción</option>
            <option value="fondo">Fondo / ETF</option>
          </Select>
          <Select label="Divisa" value={form.currency} onChange={(e) => setForm((f) => ({ ...f, currency: e.target.value }))}>
            <option value="EUR">EUR €</option>
            <option value="USD">USD $</option>
            <option value="GBP">GBP £</option>
          </Select>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          <Input label="Nº Participaciones" type="number" value={form.shares} onChange={(e) => setForm((f) => ({ ...f, shares: e.target.value }))} />
          <Input label={`Precio Medio (${form.currency === "EUR" ? "€" : "$"})`} type="number" step="0.01" value={form.avgPrice} onChange={(e) => setForm((f) => ({ ...f, avgPrice: e.target.value }))} />
          <Input label="Fecha Compra" type="date" value={form.buyDate} onChange={(e) => setForm((f) => ({ ...f, buyDate: e.target.value }))} />
        </div>

        {/* ECB Rate info */}
        {form.currency !== "EUR" && form.buyDate && (
          <div style={{
            padding: "8px 12px", borderRadius: 6, marginBottom: 10, fontSize: 11,
            background: C.blueDim, border: `1px solid ${C.blue}20`,
          }}>
            {ecbLoading ? (
              <span style={{ color: C.textDim }}>Consultando tipo BCE...</span>
            ) : ecbRate ? (
              <div style={{ color: C.blue }}>
                <div style={{ fontWeight: 600 }}>Tipo BCE ({ecbRate.date}): 1 EUR = {fmt(ecbRate.rate, 4)} {form.currency}</div>
                {avgEur != null && <div style={{ marginTop: 2, color: C.textDim }}>Precio medio en EUR: {fmtEur(avgEur)} (= {form.avgPrice}$ ÷ {fmt(ecbRate.rate, 4)})</div>}
              </div>
            ) : (
              <span style={{ color: C.red }}>No se pudo obtener el tipo BCE para esta fecha</span>
            )}
          </div>
        )}

        <Input label="Sector" value={form.sector} onChange={(e) => setForm((f) => ({ ...f, sector: e.target.value }))} placeholder="Financiero, Tecnología..." />
        <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
          <Btn onClick={submit} disabled={form.currency !== "EUR" && !ecbRate}><PlusI /> Añadir</Btn>
          <Btn variant="ghost" onClick={() => setModal(null)}>Cancelar</Btn>
        </div>
      </div>
    );
  };

  const TH = ({ cols }) => (
    <div style={{
      display: "grid", gridTemplateColumns: cols,
      gap: 6, padding: "7px 14px",
      fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: 1,
      borderBottom: `1px solid ${C.border}`,
    }}>
      <div>Activo</div>
      <div style={{ textAlign: "right" }}>Precio</div>
      <div style={{ textAlign: "right" }}>Día</div>
      <div style={{ textAlign: "right" }}>Uds.</div>
      <div style={{ textAlign: "right" }}>P/L</div>
      <div style={{ textAlign: "right" }}>Valor</div>
      <div></div>
    </div>
  );

  const Row = ({ h }) => {
    const hasPrice = h.currentPrice != null;
    const isUSD = h.currency === "USD";
    const rateBuy = h.ecbRateBuy || 1;
    const rateNow = h.ecbRateNow || rateBuy;
    const avgEur = isUSD ? toEur(h.avgPrice, rateBuy) : h.avgPrice;
    const curEur = hasPrice ? (isUSD ? toEur(h.currentPrice, rateNow) : h.currentPrice) : null;
    const pl = hasPrice ? (curEur - avgEur) * h.shares : null;
    const plPct = hasPrice ? pctChange(curEur, avgEur) : null;
    const up = pl >= 0;
    const currSymbol = isUSD ? "$" : "€";
    return (
      <div className="row" style={{
        display: "grid", gridTemplateColumns: "1.4fr 0.7fr 0.7fr 0.5fr 0.9fr 0.8fr 32px",
        gap: 6, alignItems: "center", padding: "10px 14px",
        borderBottom: `1px solid ${C.border}`, transition: "background 0.1s",
      }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ fontWeight: 600, fontSize: 12 }}>{h.ticker}</span>
            {isUSD && <span style={{ fontSize: 8, padding: "1px 4px", borderRadius: 3, background: C.blueDim, color: C.blue, fontWeight: 600 }}>USD</span>}
          </div>
          <div style={{ fontSize: 9, color: C.textDim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{h.name}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          {hasPrice ? (
            <React.Fragment>
              <div style={{ fontWeight: 500 }}>{currSymbol}{fmt(h.currentPrice)}</div>
              <div style={{ fontSize: 9, color: C.textDim }}>{isUSD ? `€${fmt(curEur)}` : `avg ${fmt(h.avgPrice)}`}</div>
            </React.Fragment>
          ) : (
            <div style={{ fontSize: 10, color: C.textMuted }}>—</div>
          )}
        </div>
        <div style={{ textAlign: "right" }}>
          {h.dayChangePct != null ? (
            <div style={{ fontSize: 11, fontWeight: 600, color: h.dayChange >= 0 ? C.accent : C.red }}>
              {fmtPct(h.dayChangePct)}
            </div>
          ) : <span style={{ color: C.textMuted }}>—</span>}
        </div>
        <div style={{ textAlign: "right", fontSize: 12 }}>{h.shares}</div>
        <div style={{ textAlign: "right" }}>
          {hasPrice ? (
            <React.Fragment>
              <div style={{ fontWeight: 600, color: up ? C.accent : C.red, fontSize: 12 }}>{fmtEur(pl)}</div>
              <div style={{ fontSize: 9, color: up ? C.accent : C.red }}>{fmtPct(plPct)}</div>
            </React.Fragment>
          ) : <span style={{ color: C.textMuted }}>—</span>}
        </div>
        <div style={{ textAlign: "right", fontWeight: 500, fontSize: 12 }}>
          {hasPrice ? fmtEur(h.shares * curEur) : "—"}
        </div>
        <div style={{ textAlign: "center" }}>
          <button onClick={() => removeHolding(h.id)} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", padding: 3 }}>
            <TrashI />
          </button>
        </div>
      </div>
    );
  };

  return (
    <div style={{ animation: "fadeIn 0.3s" }}>
      {/* Sector Breakdown */}
      {totalVal > 0 && (
        <div style={{ ...cs, marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 13, margin: 0, fontWeight: 600 }}>Distribución por Sector</h3>
            <Btn onClick={() => setModal(<HoldingForm />)} style={{ fontSize: 10, padding: "5px 10px" }}><PlusI /> Posición</Btn>
          </div>
          <div style={{ display: "flex", gap: 2, height: 6, borderRadius: 3, overflow: "hidden", marginBottom: 8 }}>
            {Object.entries(sectors).map(([n, v], i) => (
              <div key={n} style={{ flex: v / totalVal, background: sectorColors[i % sectorColors.length], transition: "flex 0.3s" }} title={`${n}: ${fmt((v / totalVal) * 100)}%`} />
            ))}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
            {Object.entries(sectors).map(([n, v], i) => (
              <div key={n} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 7, height: 7, borderRadius: 2, background: sectorColors[i % sectorColors.length] }} />
                <span style={{ fontSize: 10, color: C.textDim }}>{n}</span>
                <span style={{ fontSize: 10, fontWeight: 600 }}>{fmt((v / totalVal) * 100)}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {totalVal === 0 && (
        <div style={{ ...cs, marginBottom: 14, textAlign: "center" }}>
          <Btn onClick={() => setModal(<HoldingForm />)}><PlusI /> Añadir primera posición</Btn>

      {/* Acciones */}
      {acciones.length > 0 && (
        <div style={{ ...cs, marginBottom: 14, padding: 0, overflow: "hidden" }}>
          <div style={{ padding: "12px 14px 0", display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.accent }} />
            <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 12, margin: 0, fontWeight: 600 }}>Acciones</h3>
            <span style={{ fontSize: 9, color: C.textDim }}>({acciones.length})</span>
          </div>
          <div style={{ marginTop: 6 }}>
            <TH cols="1.4fr 0.7fr 0.7fr 0.5fr 0.9fr 0.8fr 32px" />
            {acciones.map((h) => <Row key={h.id} h={h} />)}
          </div>
        </div>
      )}

      {/* Fondos */}
      {fondos.length > 0 && (
        <div style={{ ...cs, padding: 0, overflow: "hidden" }}>
          <div style={{ padding: "12px 14px 0", display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.blue }} />
            <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 12, margin: 0, fontWeight: 600 }}>Fondos / ETFs</h3>
            <span style={{ fontSize: 9, color: C.textDim }}>({fondos.length})</span>
          </div>
          <div style={{ marginTop: 6 }}>
            <TH cols="1.4fr 0.7fr 0.7fr 0.5fr 0.9fr 0.8fr 32px" />
            {fondos.map((h) => <Row key={h.id} h={h} />)}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// VENTAS / IRPF TAB
// ═══════════════════════════════════════════════════════════════════════
function VentasTab({ sales, addSale, removeSale, setModal, cs }) {
  const years = [...new Set(sales.map((s) => s.sellDate?.slice(0, 4)))].sort().reverse();
  const [year, setYear] = useState(years[0] || "2026");
  const filtered = sales.filter((s) => s.sellDate?.startsWith(year));

  const saleDetails = filtered.map((s) => {
    const isUSD = s.currency === "USD";
    const rateBuy = s.ecbRateBuy || 1;
    const rateSell = s.ecbRateSell || 1;
    const buyUnitEur = isUSD ? toEur(s.buyPrice, rateBuy) : s.buyPrice;
    const sellUnitEur = isUSD ? toEur(s.sellPrice, rateSell) : s.sellPrice;
    const buyFees = s.buyFees || 0;
    const sellFees = s.sellFees || s.fees || 0;
    const valorAdq = buyUnitEur * s.shares + buyFees;
    const valorTrans = sellUnitEur * s.shares - sellFees;
    const pl = valorTrans - valorAdq;
    return { ...s, isUSD, rateBuy, rateSell, buyUnitEur, sellUnitEur, buyFees, sellFees, valorAdq, valorTrans, pl };
  });

  const sumAdq = saleDetails.reduce((s, x) => s + x.valorAdq, 0);
  const sumTrans = saleDetails.reduce((s, x) => s + x.valorTrans, 0);
  const sumPL = sumTrans - sumAdq;
  const totalGains = saleDetails.reduce((s, x) => x.pl > 0 ? s + x.pl : s, 0);
  const totalLosses = saleDetails.reduce((s, x) => x.pl < 0 ? s + x.pl : s, 0);
  const netPL = totalGains + totalLosses;

  const calcTax = (g) => {
    if (g <= 0) return 0;
    let rem = g, tax = 0;
    for (const [sz, rt] of [[6000, 0.19], [44000, 0.21], [150000, 0.23], [100000, 0.27], [Infinity, 0.28]]) {
      const t = Math.min(rem, sz); tax += t * rt; rem -= t; if (rem <= 0) break;
    }
    return tax;
  };

  const SaleForm = () => {
    const [f, sF] = useState({ ticker: "", name: "", sellDate: "", buyDate: "", shares: "", buyPrice: "", sellPrice: "", buyFees: "", sellFees: "", currency: "EUR" });
    const [ecbBuy, setEcbBuy] = useState(null);
    const [ecbSell, setEcbSell] = useState(null);
    const [ecbLoading, setEcbLoading] = useState(false);

    useEffect(() => {
      if (f.currency !== "EUR") {
        setEcbLoading(true);
        Promise.all([
          f.buyDate ? getECBRate(f.buyDate, f.currency) : Promise.resolve(null),
          f.sellDate ? getECBRate(f.sellDate, f.currency) : Promise.resolve(null),
        ]).then(([rb, rs]) => { setEcbBuy(rb); setEcbSell(rs); setEcbLoading(false); });
      } else { setEcbBuy(null); setEcbSell(null); }
    }, [f.currency, f.buyDate, f.sellDate]);

    const submit = () => {
      if (!f.ticker || !f.shares || !f.buyPrice || !f.sellPrice) return;
      if (f.currency !== "EUR" && (!ecbBuy || !ecbSell)) return;
      addSale({
        ...f, shares: +f.shares, buyPrice: +f.buyPrice, sellPrice: +f.sellPrice,
        buyFees: +f.buyFees || 0, sellFees: +f.sellFees || 0, fees: 0,
        ecbRateBuy: f.currency !== "EUR" && ecbBuy ? ecbBuy.rate : 1,
        ecbRateSell: f.currency !== "EUR" && ecbSell ? ecbSell.rate : 1,
      });
      setModal(null);
    };

    const bEur = f.buyPrice && f.currency !== "EUR" && ecbBuy ? toEur(+f.buyPrice, ecbBuy.rate) : null;
    const sEur = f.sellPrice && f.currency !== "EUR" && ecbSell ? toEur(+f.sellPrice, ecbSell.rate) : null;
    const vAdqP = bEur != null && f.shares ? bEur * (+f.shares) + (+f.buyFees || 0) : (f.buyPrice && f.shares && f.currency === "EUR" ? (+f.buyPrice) * (+f.shares) + (+f.buyFees || 0) : null);
    const vTransP = sEur != null && f.shares ? sEur * (+f.shares) - (+f.sellFees || 0) : (f.sellPrice && f.shares && f.currency === "EUR" ? (+f.sellPrice) * (+f.shares) - (+f.sellFees || 0) : null);
    const plP = vAdqP != null && vTransP != null ? vTransP - vAdqP : null;

    return (
      <div>
        <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 15, marginBottom: 14, color: C.amber }}>Registrar Venta</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          <Input label="Ticker" value={f.ticker} onChange={(e) => sF({ ...f, ticker: e.target.value.toUpperCase() })} />
          <Input label="Fecha Compra" type="date" value={f.buyDate} onChange={(e) => sF({ ...f, buyDate: e.target.value })} />
          <Input label="Fecha Venta" type="date" value={f.sellDate} onChange={(e) => sF({ ...f, sellDate: e.target.value })} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 8 }}>
          <Input label="Nombre" value={f.name} onChange={(e) => sF({ ...f, name: e.target.value })} />
          <Select label="Divisa" value={f.currency} onChange={(e) => sF({ ...f, currency: e.target.value })}>
            <option value="EUR">EUR €</option><option value="USD">USD $</option><option value="GBP">GBP £</option>
          </Select>
        </div>
        <Input label="Nº Acciones" type="number" value={f.shares} onChange={(e) => sF({ ...f, shares: e.target.value })} />
        <div style={{ padding: "6px 10px", borderRadius: 6, background: C.accentDim, border: `1px solid ${C.accent}15`, marginBottom: 10 }}>
          <div style={{ fontSize: 9, color: C.accent, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Adquisición (compra)</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <Input label={`Precio unitario (${f.currency === "EUR" ? "€" : "$"})`} type="number" step="0.01" value={f.buyPrice} onChange={(e) => sF({ ...f, buyPrice: e.target.value })} />
            <Input label="Comisión compra (€)" type="number" step="0.01" value={f.buyFees} onChange={(e) => sF({ ...f, buyFees: e.target.value })} />
          </div>
        </div>
        <div style={{ padding: "6px 10px", borderRadius: 6, background: C.redDim, border: `1px solid ${C.red}15`, marginBottom: 10 }}>
          <div style={{ fontSize: 9, color: C.red, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Transmisión (venta)</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <Input label={`Precio unitario (${f.currency === "EUR" ? "€" : "$"})`} type="number" step="0.01" value={f.sellPrice} onChange={(e) => sF({ ...f, sellPrice: e.target.value })} />
            <Input label="Comisión venta (€)" type="number" step="0.01" value={f.sellFees} onChange={(e) => sF({ ...f, sellFees: e.target.value })} />
          </div>
        </div>
        {f.currency !== "EUR" && (f.buyDate || f.sellDate) && (
          <div style={{ padding: "10px 12px", borderRadius: 6, marginBottom: 10, fontSize: 10, background: C.blueDim, border: `1px solid ${C.blue}20`, lineHeight: 1.8 }}>
            {ecbLoading ? <span style={{ color: C.textDim }}>Consultando tipos BCE...</span> : (
              <div style={{ color: C.blue }}>
                <div style={{ fontWeight: 600, marginBottom: 4, fontSize: 11 }}>Tipos de cambio BCE oficiales</div>
                {ecbBuy && <div>Compra ({ecbBuy.date}): 1 EUR = {fmt(ecbBuy.rate, 4)} {f.currency}{f.buyPrice ? ` → ${f.buyPrice}$ = ${fmtEur(bEur)}` : ""}</div>}
                {ecbSell && <div>Venta ({ecbSell.date}): 1 EUR = {fmt(ecbSell.rate, 4)} {f.currency}{f.sellPrice ? ` → ${f.sellPrice}$ = ${fmtEur(sEur)}` : ""}</div>}
              </div>
            )}
          </div>
        )}
        {plP != null && (
          <div style={{ padding: "10px 12px", borderRadius: 6, marginBottom: 10, fontSize: 11, background: `${plP >= 0 ? C.accent : C.red}06`, border: `1px solid ${plP >= 0 ? C.accent : C.red}20` }}>
            <div style={{ display: "flex", justifyContent: "space-between", color: C.textDim, fontSize: 10 }}>
              <span>V. Adquisición: {fmtEur(vAdqP)}</span>
              <span>V. Transmisión: {fmtEur(vTransP)}</span>
            </div>
            <div style={{ fontWeight: 700, color: plP >= 0 ? C.accent : C.red, marginTop: 4, fontSize: 13 }}>P/L: {fmtEur(plP)}</div>
          </div>
        )}
        <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
          <Btn onClick={submit} disabled={f.currency !== "EUR" && (!ecbBuy || !ecbSell)} style={{ background: C.amber, color: "#fff" }}><PlusI /> Registrar</Btn>
          <Btn variant="ghost" onClick={() => setModal(null)}>Cancelar</Btn>
        </div>
      </div>
    );
  };

  const colTpl = "1.1fr 0.45fr 0.5fr 0.55fr 0.4fr 0.65fr 0.55fr 0.4fr 0.65fr 0.6fr 26px";

  return (
    <div style={{ animation: "fadeIn 0.3s" }}>
      <div style={{ ...cs, marginBottom: 14, background: "linear-gradient(135deg, #ffffff, #f8f7ff)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 13, margin: 0 }}>Resumen Fiscal — {year}</h3>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <select value={year} onChange={(e) => setYear(e.target.value)} style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, padding: "4px 8px", fontSize: 11, fontFamily: "inherit" }}>
              {years.map((y) => <option key={y} value={y}>{y}</option>)}
            </select>
            <Btn onClick={() => setModal(<SaleForm />)} style={{ fontSize: 10, padding: "5px 10px", background: C.amber, color: "#fff" }}><PlusI /> Venta</Btn>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10 }}>
          {[
            { l: "Ganancias", v: fmtEur(totalGains), c: C.accent },
            { l: "Pérdidas", v: fmtEur(totalLosses), c: C.red },
            { l: "Resultado Neto", v: fmtEur(netPL), c: netPL >= 0 ? C.accent : C.red },
            { l: "IRPF Estimado", v: fmtEur(calcTax(netPL)), c: C.amber },
          ].map((x, i) => (
            <div key={i} style={{ padding: 10, borderRadius: 8, background: `${x.c}06`, border: `1px solid ${x.c}15` }}>
              <div style={{ fontSize: 8, color: C.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>{x.l}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: x.c }}>{x.v}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 10, padding: "6px 10px", borderRadius: 6, background: `${C.amber}06`, border: `1px solid ${C.amber}12`, fontSize: 9, color: C.textDim }}>
          Tramos base ahorro: ≤6.000€→19% | 6k–50k→21% | 50k–200k→23% | 200k–300k→27% | +300k→28%. Estimación orientativa.
        </div>
      </div>

      <div style={{ ...cs, padding: 0, overflowX: "auto" }}>
        <div style={{ display: "grid", gridTemplateColumns: colTpl, gap: 3, padding: "8px 10px 0", minWidth: 920 }}>
          <div /><div /><div />
          <div style={{ gridColumn: "span 3", textAlign: "center", fontSize: 8, fontWeight: 700, color: C.accent, textTransform: "uppercase", letterSpacing: 1, padding: "3px 0", borderRadius: "4px 4px 0 0", background: C.accentDim }}>Adquisición</div>
          <div style={{ gridColumn: "span 3", textAlign: "center", fontSize: 8, fontWeight: 700, color: C.red, textTransform: "uppercase", letterSpacing: 1, padding: "3px 0", borderRadius: "4px 4px 0 0", background: C.redDim }}>Transmisión</div>
          <div /><div />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: colTpl, gap: 3, padding: "4px 10px 6px", fontSize: 8, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.7, borderBottom: `2px solid ${C.border}`, minWidth: 920 }}>
          <div>Activo</div>
          <div style={{ textAlign: "center" }}>Acciones</div>
          <div style={{ textAlign: "center" }}>Tipo €/$</div>
          <div style={{ textAlign: "right" }}>Compra</div>
          <div style={{ textAlign: "right" }}>Comisión</div>
          <div style={{ textAlign: "right", fontWeight: 700, color: C.accent }}>V. Adquisición</div>
          <div style={{ textAlign: "right" }}>Venta</div>
          <div style={{ textAlign: "right" }}>Comisión</div>
          <div style={{ textAlign: "right", fontWeight: 700, color: C.red }}>V. Transmisión</div>
          <div style={{ textAlign: "right" }}>P/L</div>
          <div />
        </div>

        {filtered.length === 0 && <div style={{ padding: 28, textAlign: "center", color: C.textDim, fontSize: 11, minWidth: 920 }}>Sin ventas en {year}</div>}

        {saleDetails.map((d) => (
          <div key={d.id} className="row" style={{ display: "grid", gridTemplateColumns: colTpl, gap: 3, alignItems: "center", padding: "9px 10px", borderBottom: `1px solid ${C.border}`, transition: "background 0.1s", minWidth: 920 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontWeight: 600, fontSize: 11 }}>{d.ticker}</span>
                {d.isUSD && <span style={{ fontSize: 7, padding: "1px 3px", borderRadius: 2, background: C.blueDim, color: C.blue, fontWeight: 600 }}>USD</span>}
              </div>
              <div style={{ fontSize: 8, color: C.textDim }}>{d.name}</div>
              <div style={{ fontSize: 8, color: C.textMuted }}>{d.buyDate || "—"} → {d.sellDate}</div>
            </div>
            <div style={{ textAlign: "center", fontWeight: 500, fontSize: 11 }}>{d.shares}</div>
            <div style={{ textAlign: "center", fontSize: 9 }}>
              {d.isUSD ? (<div><div style={{ color: C.blue, fontWeight: 500 }}>{fmt(d.rateBuy, 4)}</div><div style={{ color: C.blue, fontWeight: 500 }}>{fmt(d.rateSell, 4)}</div></div>) : <span style={{ color: C.textMuted }}>—</span>}
            </div>
            <div style={{ textAlign: "right", fontSize: 10 }}>
              <div>{fmtEur(d.buyUnitEur)}</div>
              {d.isUSD && <div style={{ fontSize: 8, color: C.textDim }}>${fmt(d.buyPrice)}</div>}
            </div>
            <div style={{ textAlign: "right", fontSize: 10, color: d.buyFees > 0 ? C.text : C.textMuted }}>{d.buyFees > 0 ? fmtEur(d.buyFees) : "—"}</div>
            <div style={{ textAlign: "right", fontSize: 11, fontWeight: 600 }}>{fmtEur(d.valorAdq)}</div>
            <div style={{ textAlign: "right", fontSize: 10 }}>
              <div>{fmtEur(d.sellUnitEur)}</div>
              {d.isUSD && <div style={{ fontSize: 8, color: C.textDim }}>${fmt(d.sellPrice)}</div>}
            </div>
            <div style={{ textAlign: "right", fontSize: 10, color: d.sellFees > 0 ? C.text : C.textMuted }}>{d.sellFees > 0 ? fmtEur(d.sellFees) : "—"}</div>
            <div style={{ textAlign: "right", fontSize: 11, fontWeight: 600 }}>{fmtEur(d.valorTrans)}</div>
            <div style={{ textAlign: "right", fontWeight: 700, fontSize: 11, color: d.pl >= 0 ? C.accent : C.red }}>{fmtEur(d.pl)}</div>
            <div style={{ textAlign: "center" }}>
              <button onClick={() => removeSale(d.id)} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", padding: 3 }}><TrashI /></button>
            </div>
          </div>
        ))}

        {saleDetails.length > 0 && (
          <div style={{ display: "grid", gridTemplateColumns: colTpl, gap: 3, padding: "10px 10px", background: C.cardAlt, borderTop: `2px solid ${C.border}`, fontSize: 11, fontWeight: 700, minWidth: 920 }}>
            <div style={{ color: C.text, textTransform: "uppercase", fontSize: 9, letterSpacing: 1 }}>Totales</div>
            <div /><div /><div /><div />
            <div style={{ textAlign: "right", color: C.text }}>{fmtEur(sumAdq)}</div>
            <div /><div />
            <div style={{ textAlign: "right", color: C.text }}>{fmtEur(sumTrans)}</div>
            <div style={{ textAlign: "right", color: sumPL >= 0 ? C.accent : C.red, fontSize: 12 }}>{fmtEur(sumPL)}</div>
            <div />
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// RISK TAB
// ═══════════════════════════════════════════════════════════════════════
function RiesgoTab({ riskTrades, addRiskTrade, removeRiskTrade, setModal, cs }) {
  const [c, sC] = useState({ capital: 10000, riskPct: 1, entry: "", sl: "", tp: "" });
  const e = +c.entry || 0, sl = +c.sl || 0, tp = +c.tp || 0;
  const riskAmt = (c.capital * c.riskPct) / 100;
  const rps = e && sl ? Math.abs(e - sl) : 0;
  const posSize = rps > 0 ? Math.floor(riskAmt / rps) : 0;
  const posVal = posSize * e;
  const potLoss = posSize * rps;
  const potGain = tp && e ? posSize * Math.abs(tp - e) : 0;
  const rr = potLoss > 0 ? potGain / potLoss : 0;

  const save = () => {
    if (!e || !sl) return;
    addRiskTrade({ ticker: "—", entryPrice: e, stopLoss: sl, takeProfit: tp, shares: posSize, riskAmount: potLoss, rr, date: new Date().toISOString().slice(0, 10), status: "abierta" });
  };

  return (
    <div style={{ animation: "fadeIn 0.3s" }}>
      <div style={{ ...cs, marginBottom: 14, background: "linear-gradient(135deg, #ffffff, #faf8ff)" }}>
        <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 13, margin: "0 0 14px", display: "flex", alignItems: "center", gap: 6 }}>
          <RiskI /> Calculadora de Posición
        </h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))", gap: 10 }}>
          <div>
            <Input label="Capital Total (€)" type="number" value={c.capital} onChange={(ev) => sC({ ...c, capital: +ev.target.value || 0 })} />
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 3 }}>Riesgo: {c.riskPct}%</label>
              <input type="range" min="0.25" max="5" step="0.25" value={c.riskPct}
                onChange={(ev) => sC({ ...c, riskPct: +ev.target.value })}
                style={{ width: "100%", accentColor: C.red }} />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: C.textDim }}>
                <span>0.25%</span><span style={{ color: C.amber, fontWeight: 600 }}>{fmtEur(riskAmt)}</span><span>5%</span>
              </div>
            </div>
          </div>
          <div>
            <Input label="Precio Entrada" type="number" step="0.01" value={c.entry} onChange={(ev) => sC({ ...c, entry: ev.target.value })} />
            <Input label="Stop Loss" type="number" step="0.01" value={c.sl} onChange={(ev) => sC({ ...c, sl: ev.target.value })} />
            <Input label="Take Profit" type="number" step="0.01" value={c.tp} onChange={(ev) => sC({ ...c, tp: ev.target.value })} />
          </div>
        </div>

        {e > 0 && sl > 0 && (
          <div style={{ marginTop: 14, padding: 14, borderRadius: 8, background: `${C.bg}`, border: `1px solid ${C.border}` }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 10 }}>
              {[
                { l: "Tamaño Posición", v: `${posSize} uds.`, s: fmtEur(posVal), c: C.blue },
                { l: "Pérdida Máxima", v: fmtEur(potLoss), s: `${c.riskPct}% capital`, c: C.red },
                { l: "Ganancia Potencial", v: tp ? fmtEur(potGain) : "—", s: tp ? fmtPct(pctChange(tp, e)) : "Sin TP", c: C.accent },
                { l: "Ratio R:R", v: rr > 0 ? `1:${fmt(rr, 1)}` : "—", s: rr >= 2 ? "Favorable" : rr >= 1 ? "Aceptable" : "Desfavorable", c: rr >= 2 ? C.accent : rr >= 1 ? C.amber : C.red },
              ].map((x, i) => (
                <div key={i} style={{ padding: 10, borderRadius: 8, background: `${x.c}06`, border: `1px solid ${x.c}15`, textAlign: "center" }}>
                  <div style={{ fontSize: 8, color: C.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 5 }}>{x.l}</div>
                  <div style={{ fontSize: 17, fontWeight: 700, color: x.c }}>{x.v}</div>
                  <div style={{ fontSize: 9, color: C.textDim, marginTop: 2 }}>{x.s}</div>
                </div>
              ))}
            </div>
            {tp > 0 && (
              <div style={{ marginTop: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 3, height: 24 }}>
                  <div style={{ flex: Math.abs(e - sl), background: `${C.red}33`, borderRadius: "4px 0 0 4px", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: C.red, fontWeight: 600, minWidth: 36 }}>SL {fmt(sl)}</div>
                  <div style={{ width: 2, height: "100%", background: C.amber, borderRadius: 1 }} />
                  <div style={{ flex: Math.abs(tp - e), background: `${C.accent}33`, borderRadius: "0 4px 4px 0", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: C.accent, fontWeight: 600, minWidth: 36 }}>TP {fmt(tp)}</div>
                </div>
                <div style={{ textAlign: "center", fontSize: 8, color: C.amber, marginTop: 3 }}>Entrada: {fmt(e)}</div>
              </div>
            )}
            <div style={{ marginTop: 12 }}>
              <Btn onClick={save} style={{ background: C.blue, color: "#fff", fontSize: 10 }}>Guardar Operación</Btn>
            </div>
          </div>
        )}
      </div>

      {/* Saved trades */}
      <div style={{ ...cs, padding: 0, overflow: "hidden" }}>
        <div style={{ padding: "12px 14px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <h3 style={{ fontFamily: "Inter,sans-serif", fontSize: 12, margin: 0 }}>Operaciones con Riesgo Controlado</h3>
          <span style={{ fontSize: 9, color: C.textDim }}>{riskTrades.length} ops.</span>
        </div>
        {riskTrades.length === 0 ? (
          <div style={{ padding: 28, textAlign: "center", color: C.textDim, fontSize: 11 }}>Usa la calculadora para añadir operaciones</div>
        ) : (
          <React.Fragment>
            <div style={{
              display: "grid", gridTemplateColumns: "0.8fr 0.6fr 0.6fr 0.6fr 0.5fr 0.5fr 0.5fr 32px",
              gap: 5, padding: "7px 14px", fontSize: 8, color: C.textDim, textTransform: "uppercase", letterSpacing: 1,
              borderBottom: `1px solid ${C.border}`,
            }}>
              <div>Fecha</div><div style={{ textAlign: "right" }}>Entrada</div><div style={{ textAlign: "right" }}>SL</div>
              <div style={{ textAlign: "right" }}>TP</div><div style={{ textAlign: "right" }}>Uds.</div>
              <div style={{ textAlign: "right" }}>Riesgo</div><div style={{ textAlign: "right" }}>R:R</div><div></div>
            </div>
            {riskTrades.map((t) => (
              <div key={t.id} className="row" style={{
                display: "grid", gridTemplateColumns: "0.8fr 0.6fr 0.6fr 0.6fr 0.5fr 0.5fr 0.5fr 32px",
                gap: 5, alignItems: "center", padding: "9px 14px",
                borderBottom: `1px solid ${C.border}`, transition: "background 0.1s",
              }}>
                <div style={{ fontSize: 10 }}>{t.date}</div>
                <div style={{ textAlign: "right" }}>{fmt(t.entryPrice)}</div>
                <div style={{ textAlign: "right", color: C.red }}>{fmt(t.stopLoss)}</div>
                <div style={{ textAlign: "right", color: C.accent }}>{t.takeProfit ? fmt(t.takeProfit) : "—"}</div>
                <div style={{ textAlign: "right" }}>{t.shares}</div>
                <div style={{ textAlign: "right", color: C.red }}>{fmtEur(t.riskAmount)}</div>
                <div style={{ textAlign: "right", fontWeight: 600, color: t.rr >= 2 ? C.accent : t.rr >= 1 ? C.amber : C.red }}>1:{fmt(t.rr, 1)}</div>
                <div style={{ textAlign: "center" }}>
                  <button onClick={() => removeRiskTrade(t.id)} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", padding: 3 }}><TrashI /></button>
                </div>
              </div>
            ))}
          </React.Fragment>
        )}
      </div>

      <div style={{ ...cs, marginTop: 14, background: `${C.blue}06`, border: `1px solid ${C.blue}15` }}>
        <h4 style={{ fontFamily: "Inter,sans-serif", fontSize: 11, margin: "0 0 8px", color: C.blue }}>Reglas de Gestión de Riesgo</h4>
        <div style={{ fontSize: 10, color: C.textDim, lineHeight: 1.7 }}>
          <div style={{ marginBottom: 4 }}><span style={{ color: C.accent, fontWeight: 700 }}>1%</span> — No arriesgar más del 1-2% del capital por operación</div>
          <div style={{ marginBottom: 4 }}><span style={{ color: C.accent, fontWeight: 700 }}>1:2</span> — Ratio riesgo/recompensa mínimo de 1:2</div>
          <div style={{ marginBottom: 4 }}><span style={{ color: C.accent, fontWeight: 700 }}>SL</span> — Siempre colocar stop loss antes de entrar</div>
          <div><span style={{ color: C.accent, fontWeight: 700 }}>5%</span> — No exponer más del 5-6% del capital simultáneamente</div>
        </div>
      </div>
    </div>
  );
}

// ─── MOUNT ───
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
